<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>replATE – Reduce Waste, Feed Lives</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
:root {
  --text: #1A1D23;
  --text-2: #6B7280;
  --text-3: #9CA3AF;
  --border: #E8ECF0;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:'DM Sans',sans-serif;
  overflow:hidden;
  height:100vh;
}

/* BACKGROUND */
#login-bg {
  position:fixed;
  inset:0;
  z-index:0;
  background: linear-gradient(120deg,#3b82f6,#6366f1,#a855f7,#ec4899);
  background-size: 400% 400%;
  animation: gradientFlow 18s ease-in-out infinite;
}

@keyframes gradientFlow {
  0% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
  100% { background-position:0% 50%; }
}

#login-bg::after {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(60px);
}

/* GRID */
.grid-overlay {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:2;
  background-image:
    linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* PAGE */
.login-page {
  position:relative;
  z-index:10;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* CARD */
.login-card {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(26px);
  border-radius: 28px;
  padding: 44px 40px;
  width: 430px;
  box-shadow: 0 30px 90px rgba(0,0,0,0.18);
  border: 1px solid rgba(255,255,255,0.4);
}

/* LOGO */
.login-logo {
  text-align:center;
  margin-bottom:32px;
}

.login-logo-icon {
  width:80px;
  height:80px;
  border-radius:22px;
  background: linear-gradient(135deg,#3b82f6,#a855f7,#ec4899);
  background-size:200% 200%;
  animation: iconFlow 6s ease-in-out infinite;
  display:grid;
  place-items:center;
  font-size:36px;
  margin:0 auto 14px;
  box-shadow:0 12px 35px rgba(99,102,241,0.35);
}

@keyframes iconFlow {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.login-logo h1 {
  font-size:32px;
  font-weight:900;
}

.login-logo p {
  color:var(--text-2);
  font-size:14px;
}

/* TABS */
.login-tabs {
  display:flex;
  gap:8px;
  margin-bottom:24px;
  background:#f3f4f6;
  border-radius:14px;
  padding:4px;
}

.login-tab {
  flex:1;
  padding:10px;
  border-radius:11px;
  border:none;
  cursor:pointer;
  font-weight:600;
  background:transparent;
  color:var(--text-2);
}

.login-tab.active {
  background:#fff;
  color:#6366f1;
  box-shadow:0 6px 18px rgba(99,102,241,0.15);
}

/* FORM */
.login-form { display:none; }
.login-form.active { display:block; }

.form-group {
  margin-bottom:16px;
}

.form-group label {
  display:block;
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
}

.input-wrap {
  position:relative;
}

.input-wrap .input-icon {
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-3);
}

.input-wrap input {
  width:100%;
  padding:12px 16px 12px 42px;
  border-radius:12px;
  border:1.5px solid var(--border);
  outline:none;
}

/* BUTTON */
.sign-in-btn,
.quick-btn {
  background: linear-gradient(90deg,#3b82f6,#6366f1,#a855f7,#ec4899);
  background-size:200% 200%;
  animation: btnFlow 6s ease-in-out infinite;
  color:#fff;
  font-weight:700;
  border:none;
  cursor:pointer;
  transition:0.3s;
}

@keyframes btnFlow {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.sign-in-btn {
  width:100%;
  padding:14px;
  border-radius:13px;
}

/* QUICK BUTTONS */
.quick-btns {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.quick-btn {
  padding:12px;
  border-radius:13px;
}

/* ⭐ IMPROVED FLOATING STATS */
.floating-stat {
  position:fixed;
  z-index:5;
  padding:14px 20px;
  border-radius:18px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(18px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  border: 1px solid rgba(255,255,255,0.5);
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  color:#1f2937;
  animation: floaty 6s ease-in-out infinite;
}

/* glow badge icon */
.floating-stat span.icon {
  width:34px;
  height:34px;
  border-radius:10px;
  display:grid;
  place-items:center;
  color:white;
  font-size:14px;
}

/* positions */
.fs-1 { top:12%; left:4%; }
.fs-2 { top:12%; right:4%; }
.fs-3 { bottom:12%; left:4%; }
.fs-4 { bottom:12%; right:4%; }

/* different icon gradients */
.fs-1 span.icon { background:linear-gradient(135deg,#f59e0b,#ef4444); }
.fs-2 span.icon { background:linear-gradient(135deg,#10b981,#3b82f6); }
.fs-3 span.icon { background:linear-gradient(135deg,#8b5cf6,#ec4899); }
.fs-4 span.icon { background:linear-gradient(135deg,#06b6d4,#6366f1); }

@keyframes floaty {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}

.floating-stat:hover {
  transform: scale(1.05);
  transition:0.3s;
}

/* MOBILE */
@media(max-width:600px) {
  .floating-stat { display:none; }
  .login-card { width:100%; }
}
</style>
</head>

<body>

<div id="login-bg"></div>
<div class="grid-overlay"></div>

<!-- ⭐ IMPROVED FLOATING STATS -->
<div class="floating-stat fs-1">
  <span class="icon">🍽️</span>
  <div>12,540 Meals Saved</div>
</div>

<div class="floating-stat fs-2">
  <span class="icon">🏢</span>
  <div>45 NGO Partners</div>
</div>

<div class="floating-stat fs-3">
  <span class="icon">♻️</span>
  <div>3.2T Waste Prevented</div>
</div>

<div class="floating-stat fs-4">
  <span class="icon">🚚</span>
  <div>1,250 Volunteers</div>
</div>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-icon">🍽️</div>
      <h1>replATE</h1>
      <p>Reduce waste · Feed lives · Build community</p>
    </div>

    <div class="login-tabs">
      <button class="login-tab active" onclick="switchLoginTab('email')">Email Login</button>
      <button class="login-tab" onclick="switchLoginTab('quick')">Quick Demo</button>
    </div>

    <div class="login-form active" id="email-form">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="login-email">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="login-pass">
        </div>
      </div>

      <button class="sign-in-btn" onclick="loginEmail()">Sign In</button>
    </div>

    <div class="login-form" id="quick-form">
      <p style="margin-bottom:10px;">Quick demo access</p>

      <div class="quick-btns">
        <button class="quick-btn" onclick="loginAs('donor')">Donor</button>
        <button class="quick-btn" onclick="loginAs('ngo')">NGO</button>
        <button class="quick-btn" onclick="loginAs('volunteer')">Volunteer</button>
        <button class="quick-btn" onclick="loginAs('admin')">Admin</button>
      </div>
    </div>

  </div>
</div>

<script>
function switchLoginTab(tab) {
  document.getElementById('email-form').classList.toggle('active', tab==='email');
  document.getElementById('quick-form').classList.toggle('active', tab==='quick');
}

function loginEmail() {
  const email = document.getElementById('login-email').value;
  if (!email) return alert("Enter email");
  loginAs('admin');
}

function loginAs(role) {
  const pages = {
    donor:'dashboard-donor.html',
    ngo:'dashboard-ngo.html',
    volunteer:'dashboard-volunteer.html',
    admin:'dashboard-admin.html'
  };
  window.location.href = pages[role];
}
</script>

</body>
</html>
